<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pedido Confirmado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #18181b; }
    .wrapper { max-width: 580px; margin: 40px auto; padding: 0 16px; }
    .card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .header { background: #18181b; padding: 32px 40px; text-align: center; }
    .header h1 { color: #fff; font-size: 20px; font-weight: 600; }
    .badge { display: inline-block; background: #dcfce7; color: #166534; border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: 600; margin-top: 8px; }
    .body { padding: 40px; }
    .greeting { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .text { font-size: 15px; line-height: 1.7; color: #52525b; margin-bottom: 24px; }
    .pedido-box { border: 1px solid #e4e4e7; border-radius: 10px; overflow: hidden; margin-bottom: 24px; }
    .pedido-row { display: flex; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f4f4f5; font-size: 14px; }
    .pedido-row:last-child { border-bottom: none; }
    .pedido-row .label { color: #71717a; }
    .pedido-row .value { font-weight: 600; }
    .pedido-row.total { background: #f9f9f9; }
    .pedido-row.total .value { font-size: 16px; color: #166534; }
    .info-box { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #1e40af; margin-bottom: 24px; }
    .btn-wrap { text-align: center; }
    .btn { display: inline-block; background: #18181b; color: #fff !important; text-decoration: none; padding: 14px 36px; border-radius: 8px; font-size: 15px; font-weight: 600; }
    .footer { background: #f4f4f5; padding: 24px 40px; text-align: center; font-size: 12px; color: #a1a1aa; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="header">
      <h1>📱 Intelifones</h1>
      <span class="badge">✓ Pedido confirmado</span>
    </div>
    <div class="body">
      <p class="greeting" th:text="'Olá, ' + ${nome} + '!'">Olá!</p>
      <p class="text">Seu pedido foi recebido com sucesso!</p>
      <div class="pedido-box">
        <div class="pedido-row"><span class="label">Número do pedido</span><span class="value" th:text="'#' + ${pedidoId}">#0000</span></div>
        <div class="pedido-row"><span class="label">Status</span><span class="value">Pago</span></div>
        <div class="pedido-row total"><span class="label">Total (com frete)</span><span class="value" th:text="${valorTotal}">R$ 0,00</span></div>
      </div>
      <div class="info-box">ℹ️ Assim que o pedido for enviado, você receberá mais informações.</div>
      <div class="btn-wrap"><a th:href="${baseUrl}" class="btn">Ver meus pedidos</a></div>
    </div>
    <div class="footer"><p>© 2025 Intelifones · Marketplace de peças para smartphones</p></div>
  </div>
</div>
</body>
</html>
