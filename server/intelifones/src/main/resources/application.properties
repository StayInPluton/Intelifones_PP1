spring.application.name=intelifones

server.port=8080
spring.config.import=optional:file:.env[.properties]

# Datasource - PostgreSQL no Docker
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5435/fones
spring.datasource.username=postgres
spring.datasource.password=fones

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true

# Documentação
springdoc.api-docs.path=/api-docs

# ===== JWT (Autenticação) =====
# Chave secreta para assinar os tokens JWT (mínimo 32 caracteres)
jwt.secret=chaveSuperSecretaParaGerarTokenJWTComTamanhoMinimoDe256Bits

# Tempo de expiração do token em milissegundos (86400000 = 24 horas)
jwt.expiration=86400000

# Logs para ver exatamente o SQL que está falhando
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.forward-headers-strategy=framework