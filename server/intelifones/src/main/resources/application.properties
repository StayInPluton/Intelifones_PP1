spring.application.name=intelifones

server.port=8080
spring.config.import=optional:file:.env[.properties]

# ===== Banco de dados =====
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5435/fones
spring.datasource.username=postgres
spring.datasource.password=fones

# ===== JPA =====
# ATENÇÃO: mude para "update" após o primeiro deploy para não perder dados
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true

# ===== Swagger =====
springdoc.api-docs.path=/api-docs

# ===== JWT =====
jwt.secret=chaveSuperSecretaParaGerarTokenJWTComTamanhoMinimoDe256Bits
jwt.expiration=86400000

# ===== Upload de arquivos =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.forward-headers-strategy=framework

# ===== E-mail (Gmail) =====
# Passo a passo:
# 1. Acesse myaccount.google.com/security
# 2. Ative verificação em duas etapas
# 3. Gere uma "Senha de app" (não é a senha da conta Google)
# 4. Use a senha de app abaixo
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== Thymeleaf =====
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== Google Maps (Frete) =====
# Ative "Distance Matrix API" em console.cloud.google.com
google.maps.api.key=${GOOGLE_MAPS_KEY}
loja.endereco.origem=Rua do Futuro, 123, Recife, Pernambuco, Brasil

# ===== URL base (usada nos links dos e-mails) =====
app.base-url=http://localhost:8080

# ===== Logs =====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.tool.hbm2ddl=DEBUG
server.forward-headers-strategy=framework
